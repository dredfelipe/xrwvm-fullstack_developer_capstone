<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cars Dealership</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    async function logout(event) {
      event.preventDefault();
      await fetch('/djangoapp/logout');
      sessionStorage.clear();
      window.location.reload();
    }

    function checkSession() {
      const username = sessionStorage.getItem('username');
      const panel = document.getElementById('loginlogout');
      if (username) {
        panel.innerHTML =
          '<span class="welcome-user">Welcome, ' + username + '</span>' +
          '<a class="btn btn-outline-light" href="/djangoapp/logout" onclick="logout(event)">Logout</a>';
      } else {
        panel.innerHTML =
          '<a class="btn btn-outline-light" href="/login">Login</a>' +
          '<a class="btn btn-light" href="/register">Register</a>';
      }
    }
  </script>
</head>
<body onload="checkSession()">
  <nav class="navbar navbar-expand-lg navbar-dark dealership-nav">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">Cars Dealership</a>
      <div class="navbar-nav me-auto">
        <a class="nav-link active" aria-current="page" href="/">Home</a>
        <a class="nav-link" href="/about">About Us</a>
        <a class="nav-link" href="/contact">Contact Us</a>
      </div>
      <div class="auth-links" id="loginlogout"></div>
    </div>
  </nav>

  <main class="home-hero">
    <div class="home-copy">
      <p class="eyebrow">Find your next dealership</p>
      <h1>Trusted dealers. Real customer reviews.</h1>
      <p>Browse branches across the United States and choose a dealership with confidence.</p>
      <a href="/dealers" class="btn btn-primary btn-lg">View Dealerships</a>
    </div>
    <img src="/static/car_dealership.jpg" alt="Modern cars displayed at a dealership">
  </main>
</body>
</html>
