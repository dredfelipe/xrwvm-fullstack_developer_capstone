apiVersion: apps/v1
kind: Deployment
metadata:
  name: cars-dealership
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cars-dealership
  template:
    metadata:
      labels:
        app: cars-dealership
    spec:
      containers:
        - name: cars-dealership
          image: us.icr.io/YOUR_NAMESPACE/cars-dealership:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
            - name: DJANGO_DEBUG
              value: "False"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cars-dealership-service
spec:
  selector:
    app: cars-dealership
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
