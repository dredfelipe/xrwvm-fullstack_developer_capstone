name: Cars Dealership CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python Files
        run: python -m compileall -q server/djangoapp server/djangoproj server/manage.py

  lint-javascript:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm ci

      - name: Lint JavaScript Files
        working-directory: server/frontend
        run: npx eslint src --ext .js,.jsx

  validate:
    name: Build and Test Application
    runs-on: ubuntu-latest
    needs: [lint-python, lint-javascript]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install Python dependencies
        run: pip install -r server/requirements.txt

      - name: Check Django application
        run: |
          python server/manage.py migrate --noinput
          python server/manage.py check
          python server/manage.py test djangoapp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm ci

      - name: Build React frontend
        working-directory: server/frontend
        env:
          CI: "false"
        run: npm run build

      - name: Validate Node API syntax
        run: |
          node --check server/database/app.js
          node --check server/database/dealership.js
          node --check server/database/review.js
